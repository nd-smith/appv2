apiVersion: apps/v1
kind: Deployment
metadata:
  name: transform-claimx
  labels:
    app: pipeline
    component: transform
    source: claimx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pipeline
      component: transform
      source: claimx
  template:
    metadata:
      labels:
        app: pipeline
        component: transform
        source: claimx
    spec:
      containers:
        - name: transform
          image: pipeline:latest
          command: ["python", "-m", "pipeline.workers.transform"]
          args: ["--source", "claimx"]
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: pipeline-secrets
                  key: kafka-bootstrap-servers
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      terminationGracePeriodSeconds: 30
