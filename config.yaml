pipeline:
  kafka:
    bootstrap_servers: "${KAFKA_BOOTSTRAP_SERVERS}"
    logging_topic: "pipeline.logs"
    dead_letter_topic: "pipeline.dead-letter"
    auth:
      security_protocol: "SASL_SSL"
      sasl_mechanism: "OAUTHBEARER"
      sasl_oauthbearer_method: "oidc"
      sasl_oauthbearer_client_id: "${KAFKA_OAUTH_CLIENT_ID}"
      sasl_oauthbearer_client_secret: "${KAFKA_OAUTH_CLIENT_SECRET}"
      sasl_oauthbearer_token_endpoint_url: "${KAFKA_OAUTH_TOKEN_URL}"
      sasl_oauthbearer_scope: "${KAFKA_OAUTH_SCOPE}"

sources:
  claimx:
    source_id: "claimx"
    eventhub:
      connection_string: "${CLAIMX_EVENTHUB_CONNECTION_STRING}"
      consumer_group: "propgateway-cx-bridge"
      eventhub_name: "${CLAIMX_EVENTHUB_NAME}"
    kafka:
      internal_topic: "pipeline.claimx.internal"
      target_topic: "pipeline.claimx.target"
      consumer_group: "transform-claimx"
    schema_ref: "schemas/claimx/v1.json"
    retry:
      max_retries: 3
      initial_backoff_s: 1
      max_backoff_s: 30
      backoff_multiplier: 2
